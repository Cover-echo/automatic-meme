<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>屏幕检测器 - 诊断测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #fff;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .test-card {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            backdrop-filter: blur(10px);
        }
        .test-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .test-item:last-child { border-bottom: none; }
        .test-label { font-size: 14px; color: #ccc; }
        .test-status {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-pass { background: #10b981; color: white; }
        .status-fail { background: #ef4444; color: white; }
        .status-warn { background: #f59e0b; color: white; }
        .status-pending { background: #6b7280; color: white; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin: 5px;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .console-output {
            background: #000;
            border-radius: 8px;
            padding: 15px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 15px;
        }
        .log-entry { margin: 4px 0; }
        .log-info { color: #60a5fa; }
        .log-success { color: #34d399; }
        .log-error { color: #f87171; }
        .log-warn { color: #fbbf24; }
        .actions { text-align: center; margin-top: 20px; }
        code {
            background: rgba(255,255,255,0.2);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 屏幕检测器 - 诊断测试</h1>
        
        <div class="test-card">
            <h2 style="margin-bottom: 15px; font-size: 18px;">📦 依赖库检查</h2>
            <div id="libTests"></div>
        </div>
        
        <div class="test-card">
            <h2 style="margin-bottom: 15px; font-size: 18px;">🌐 网络能力检查</h2>
            <div id="networkTests"></div>
        </div>
        
        <div class="test-card">
            <h2 style="margin-bottom: 15px; font-size: 18px;">📹 摄像头权限检查</h2>
            <div id="cameraTests"></div>
        </div>
        
        <div class="test-card">
            <h2 style="margin-bottom: 15px; font-size: 18px;">💾 存储能力检查</h2>
            <div id="storageTests"></div>
        </div>
        
        <div class="actions">
            <button class="btn" onclick="runAllTests()">🔄 重新运行所有测试</button>
            <button class="btn" onclick="openMainApp()">🚀 打开主应用</button>
        </div>
        
        <div class="test-card" style="margin-top: 20px;">
            <h2 style="margin-bottom: 15px; font-size: 18px;">📋 测试日志</h2>
            <div class="console-output" id="consoleOutput"></div>
        </div>
    </div>

    <script>
        const log = {
            info: (msg) => addLog(msg, 'info'),
            success: (msg) => addLog(msg, 'success'),
            error: (msg) => addLog(msg, 'error'),
            warn: (msg) => addLog(msg, 'warn')
        };
        
        function addLog(msg, type) {
            const output = document.getElementById('consoleOutput');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${msg}`;
            output.appendChild(entry);
            output.scrollTop = output.scrollHeight;
        }
        
        function createTestItem(label, status, detail = '') {
            const statusClass = {
                'pass': 'status-pass',
                'fail': 'status-fail',
                'warn': 'status-warn',
                'pending': 'status-pending'
            }[status];
            
            const statusText = {
                'pass': '✓ 通过',
                'fail': '✗ 失败',
                'warn': '⚠ 警告',
                'pending': '⏳ 检测中'
            }[status];
            
            return `
                <div class="test-item">
                    <div>
                        <div class="test-label">${label}</div>
                        ${detail ? `<div style="font-size:11px;color:#888;margin-top:4px;">${detail}</div>` : ''}
                    </div>
                    <div class="test-status ${statusClass}">${statusText}</div>
                </div>
            `;
        }
        
        async function testLibraries() {
            const container = document.getElementById('libTests');
            let html = '';
            
            // FaceMesh
            html += createTestItem(
                'FaceMesh',
                typeof FaceMesh !== 'undefined' ? 'pass' : 'fail',
                typeof FaceMesh !== 'undefined' ? '已加载' : '未定义'
            );
            
            // Camera
            html += createTestItem(
                'Camera (camera_utils)',
                typeof Camera !== 'undefined' ? 'pass' : 'fail',
                typeof Camera !== 'undefined' ? '已加载' : '未定义'
            );
            
            // Drawing Utils
            html += createTestItem(
                'Drawing Utils',
                typeof drawConnectors !== 'undefined' ? 'pass' : 'fail',
                typeof drawConnectors !== 'undefined' ? '已加载' : '未定义'
            );
            
            // FACEMESH constants
            html += createTestItem(
                'FACEMESH 常量',
                typeof FACEMESH_TESSELATION !== 'undefined' ? 'pass' : 'warn',
                typeof FACEMESH_TESSELATION !== 'undefined' ? '可用' : '部分功能可能受限'
            );
            
            container.innerHTML = html;
            
            if (typeof FaceMesh === 'undefined') {
                log.error('FaceMesh 未加载，尝试从 CDN 加载...');
                if (typeof window.loadMediaPipeFallback === 'function') {
                    await window.loadMediaPipeFallback();
                    setTimeout(() => testLibraries(), 1000);
                }
            } else {
                log.success('所有依赖库加载成功');
            }
        }
        
        async function testNetwork() {
            const container = document.getElementById('networkTests');
            let html = '';
            
            // Check if running on localhost or https
            const isSecure = location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
            html += createTestItem(
                '安全上下文',
                isSecure ? 'pass' : 'fail',
                isSecure ? '支持摄像头访问' : 'file:// 协议可能无法访问摄像头'
            );
            
            // Test CDN connectivity
            const cdnUrls = [
                'https://cdn.jsdelivr.net',
                'https://unpkg.com'
            ];
            
            for (const url of cdnUrls) {
                try {
                    const controller = new AbortController();
                    const timeout = setTimeout(() => controller.abort(), 5000);
                    const response = await fetch(url, { method: 'HEAD', signal: controller.signal });
                    clearTimeout(timeout);
                    html += createTestItem(
                        `CDN: ${new URL(url).hostname}`,
                        response.ok ? 'pass' : 'warn',
                        `状态码：${response.status}`
                    );
                    log.info(`${url}: ${response.status}`);
                } catch (e) {
                    html += createTestItem(
                        `CDN: ${new URL(url).hostname}`,
                        'fail',
                        e.name === 'AbortError' ? '超时' : e.message
                    );
                    log.error(`${url}: ${e.message}`);
                }
            }
            
            container.innerHTML = html;
        }
        
        async function testCamera() {
            const container = document.getElementById('cameraTests');
            let html = '';
            
            // Check mediaDevices support
            html += createTestItem(
                'mediaDevices API',
                navigator.mediaDevices ? 'pass' : 'fail',
                navigator.mediaDevices ? '浏览器支持' : '浏览器不支持'
            );
            
            if (!navigator.mediaDevices) {
                container.innerHTML = html;
                log.error('浏览器不支持 mediaDevices API');
                return;
            }
            
            // Check getUserMedia support
            html += createTestItem(
                'getUserMedia',
                navigator.mediaDevices.getUserMedia ? 'pass' : 'fail',
                navigator.mediaDevices.getUserMedia ? '支持' : '不支持'
            );
            
            container.innerHTML = html;
            
            // Test camera permission (optional)
            log.info('测试摄像头访问...');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                stream.getTracks().forEach(track => track.stop());
                
                document.getElementById('cameraTests').innerHTML += createTestItem(
                    '摄像头访问',
                    'pass',
                    '可以正常访问摄像头'
                );
                log.success('摄像头访问测试通过');
            } catch (e) {
                document.getElementById('cameraTests').innerHTML += createTestItem(
                    '摄像头访问',
                    e.name === 'NotAllowedError' ? 'warn' : 'fail',
                    e.name === 'NotAllowedError' ? '权限被拒绝' : e.message
                );
                log.error(`摄像头访问失败：${e.message}`);
            }
        }
        
        function testStorage() {
            const container = document.getElementById('storageTests');
            let html = '';
            
            // localStorage
            try {
                localStorage.setItem('__test__', '1');
                localStorage.removeItem('__test__');
                html += createTestItem('localStorage', 'pass', '可用');
                log.success('localStorage 可用');
            } catch (e) {
                html += createTestItem('localStorage', 'warn', e.message);
                log.warn(`localStorage 不可用：${e.message}`);
            }
            
            container.innerHTML = html;
        }
        
        async function runAllTests() {
            log.info('开始运行所有测试...');
            document.getElementById('consoleOutput').innerHTML = '';
            
            await testLibraries();
            await testNetwork();
            await testCamera();
            testStorage();
            
            log.success('所有测试完成！');
        }
        
        function openMainApp() {
            const url = window.location.href.replace('screen-detector-test.html', 'screen-detector.html');
            window.location.href = url;
        }
        
        // Auto-run on load
        window.addEventListener('DOMContentLoaded', runAllTests);
    </script>
</body>
</html>
